name: Build & Push

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/llama-cpp-ptero

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cuda
            dockerfile: Dockerfile.cuda
            tag_suffix: cuda
            upstream: ghcr.io/ggml-org/llama.cpp:server-cuda
          - variant: cpu
            dockerfile: Dockerfile.cpu
            tag_suffix: cpu
            upstream: ghcr.io/ggml-org/llama.cpp:server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get upstream digest
        id: upstream
        run: |
          docker pull ${{ matrix.upstream }}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ matrix.upstream }})
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Upstream digest: ${DIGEST}"

      - name: Check if rebuild needed
        id: check
        uses: actions/cache@v4
        with:
          path: .digest-cache-${{ matrix.variant }}
          key: upstream-digest-${{ matrix.variant }}-${{ steps.upstream.outputs.digest }}

      - name: Log in to GHCR
        if: steps.check.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        if: steps.check.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            type=raw,value=${{ matrix.tag_suffix }}
            type=raw,value=${{ matrix.tag_suffix }}-{{date 'YYYYMMDD'}}

      - name: Build and push
        if: steps.check.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save digest cache
        if: steps.check.outputs.cache-hit != 'true'
        run: touch .digest-cache-${{ matrix.variant }}
